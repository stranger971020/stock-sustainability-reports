name: 🚀 Deploy A-Share Sustainability Reports (FIXED)

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install deps
        run: pip install pandas matplotlib tushare
      - name: Run analysis
        working-directory: ./block-sustainability/
        run: python generate_full_charts.py
      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./block-sustainability/reports/
