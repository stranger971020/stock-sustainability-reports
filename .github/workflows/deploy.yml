name: 🚀 Deploy A-Share Sustainability Reports (FIXED)

on:
  schedule:
    - cron: '30 12 * * *'   # UTC 12:30 = Beijing 20:30
  workflow_dispatch:        # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout Repository Code
        uses: actions/checkout@v4

      - name: ⚙️ Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🔧 Install Required Packages
        run: pip install pandas matplotlib tushare

      - name: 🎨 Run Daily Analysis Pipeline
        working-directory: ./block-sustainability/
        run: |
          echo "🚀 Starting daily report generation..."
          python generate_full_charts.py 2>&1 | tee -a logs/pipeline.log

          # Check if charts generated successfully
          CHARTS=$(ls ../charts/*.png 2>/dev/null | wc -l)
          if [ "$CHARTS" -eq 0 ]; then
            echo "❌ No charts generated, aborting."
            exit 1
          fi

          REPORT_COUNT=$(find . -name "daily_report_*.html" 2>/dev/null | wc -l)
          if [ "$REPORT_COUNT" -eq 13 ]; then
            echo "✅ All reports generated successfully!"
          else
            echo "⚠️ Missing report files. Found $REPORT_COUNT/13 reports."
            exit 1
          fi

      - name: 🌐 Deploy Results to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./block-sustainability/reports/
          keep_files: false
          commit_message: "📊 A-share reports deployed (Beijing time 20:30 UTC)"

      - name: 🔔 Notify on Completion
        run: |
          echo "✅ Deployment successful! Reports live at https://stranger971020.github.io/stock-sustainability-reports/index.html"